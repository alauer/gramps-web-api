name: unit tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Ubuntu dependencies
        run: sudo apt update && sudo apt-get -y install gettext appstream pkg-config libcairo2-dev gir1.2-gtk-3.0 libgirepository1.0-dev libicu-dev libopencv-dev tesseract-ocr tesseract-ocr-all gir1.2-pango-1.0 poppler-utils
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install opencv-python
          pip install -r requirements-dev.txt
          pip install .[ai]
          pip list
      - name: Clean up package caches
        run: |
          sudo apt-get clean
          pip cache purge
          df -h
      - name: Check for single alembic head
        run: |
          HEAD_COUNT=$(alembic heads | wc -l)
          if [ "$HEAD_COUNT" -ne 1 ]; then
            echo "ERROR: Multiple alembic heads detected! Run 'alembic heads' to inspect."
            alembic heads
            exit 1
          fi
      - name: Run type checker
        run: mypy --install-types --non-interactive --ignore-missing-imports --exclude build .
      - name: Test with pytest
        run: pytest -x

  test-base-image:
    runs-on: ubuntu-24.04
    container: ghcr.io/gramps-project/gramps-web-base:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install package
        run: pip install --no-cache-dir -r requirements-dev.txt && pip install --no-cache-dir .[ai]
      - name: Test with pytest
        run: pytest -x
